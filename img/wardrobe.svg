<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" width="420" height="240" role="img" aria-label="An open wardrobe with clothes on a rail and folded stacks on the shelves">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2c22"/>
      <stop offset="1" stop-color="#241a14"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e7d5"/>
      <stop offset="1" stop-color="#e2cfb4"/>
    </linearGradient>
    <linearGradient id="bay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a382b"/>
      <stop offset="1" stop-color="#33251c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#ffd9a0" stop-opacity=".38"/>
      <stop offset="1" stop-color="#ffd9a0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6aa8ff"/><stop offset="1" stop-color="#4b7bd6"/></linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#45c4c0"/><stop offset="1" stop-color="#2c9a97"/></linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e6935a"/><stop offset="1" stop-color="#cf6f36"/></linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6bbf82"/><stop offset="1" stop-color="#3f8f5b"/></linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e7789b"/><stop offset="1" stop-color="#cf5480"/></linearGradient>
    <linearGradient id="c6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b07fd0"/><stop offset="1" stop-color="#8a5aa8"/></linearGradient>
    <linearGradient id="c7" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7a86d6"/><stop offset="1" stop-color="#515fb0"/></linearGradient>
    <linearGradient id="c8" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e6b455"/><stop offset="1" stop-color="#c8912a"/></linearGradient>
  </defs>

  <rect width="420" height="240" rx="18" fill="url(#bg)"/>
  <!-- warm light spilling from the open doors -->
  <ellipse cx="210" cy="16" rx="190" ry="90" fill="url(#glow)"/>

  <!-- cabinet carcass -->
  <rect x="34" y="20" width="352" height="204" rx="10" fill="url(#wood)"/>
  <rect x="34" y="20" width="352" height="204" rx="10" fill="none" stroke="#c9ae8b" stroke-width="1.5"/>

  <!-- ============ left bay: the hanging rail ============ -->
  <rect x="46" y="32" width="176" height="150" rx="6" fill="url(#bay)"/>
  <!-- rail -->
  <rect x="54" y="48" width="160" height="3.5" rx="1.75" fill="#d9bf99"/>

  <!-- hanging garments (hanger hook + garment) -->
  <g stroke="#caa87f" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M74 50v-5a3 3 0 1 1 3 3"/><path d="M62 60 74 50l12 10"/>
    <path d="M104 50v-5a3 3 0 1 1 3 3"/><path d="M92 60 104 50l12 10"/>
    <path d="M134 50v-5a3 3 0 1 1 3 3"/><path d="M122 60 134 50l12 10"/>
    <path d="M164 50v-5a3 3 0 1 1 3 3"/><path d="M152 60 164 50l12 10"/>
    <path d="M194 50v-5a3 3 0 1 1 3 3"/><path d="M182 60 194 50l12 10"/>
  </g>
  <!-- shirt -->
  <path d="M64 60h20l6 5-4 5-2-1.5V126H64V68.5L62 70l-4-5z" transform="translate(4,0)" fill="url(#c1)"/>
  <!-- dress -->
  <path d="M98 60h12l4 5-3 3 8 52H90l8-52-3-3z" transform="translate(2,0)" fill="url(#c5)"/>
  <!-- hoodie -->
  <path d="M124 60h20l6 5-4 5-2-1.5V132h-20V68.5L122 70l-4-5z" transform="translate(4,0)" fill="url(#c3)"/>
  <!-- jacket -->
  <path d="M154 60h20l6 5-4 5-2-1.5V130h-20V68.5L152 70l-4-5z" transform="translate(4,0)" fill="url(#c4)"/>
  <path d="M168 62v68" stroke="rgba(0,0,0,.18)" stroke-width="1.2" fill="none"/>
  <!-- long coat -->
  <path d="M184 60h20l6 5-4 5-2-1.5V150h-20V68.5L182 70l-4-5z" transform="translate(4,0)" fill="url(#c6)"/>

  <!-- shoes on the floor of the left bay -->
  <path d="M60 176c0-3 2-4 4-4.4l6-1.6 4-3c.8-.7 2-.6 2.7.2l1 1.2c1.8 1.8 4.2 2.8 6.7 3.1l2 .3c1.4.2 2.4 1.4 2.4 2.8v1.4a1 1 0 0 1-1 1H61a1 1 0 0 1-1-1z" fill="#9aa0a6"/>
  <path d="M96 176c0-3 2-4 4-4.4l6-1.6 4-3c.8-.7 2-.6 2.7.2l1 1.2c1.8 1.8 4.2 2.8 6.7 3.1l2 .3c1.4.2 2.4 1.4 2.4 2.8v1.4a1 1 0 0 1-1 1H97a1 1 0 0 1-1-1z" fill="#6b7075"/>

  <!-- ============ right bay: shelves ============ -->
  <rect x="234" y="32" width="140" height="150" rx="6" fill="url(#bay)"/>
  <!-- shelf boards -->
  <rect x="234" y="80" width="140" height="4" rx="2" fill="#d9bf99"/>
  <rect x="234" y="130" width="140" height="4" rx="2" fill="#d9bf99"/>

  <!-- folded stacks, top shelf -->
  <rect x="246" y="62" width="52" height="7" rx="2.5" fill="url(#c2)"/>
  <rect x="246" y="53" width="52" height="7" rx="2.5" fill="url(#c8)"/>
  <rect x="246" y="44" width="52" height="7" rx="2.5" fill="url(#c1)"/>
  <rect x="310" y="62" width="52" height="7" rx="2.5" fill="url(#c5)"/>
  <rect x="310" y="53" width="52" height="7" rx="2.5" fill="url(#c6)"/>

  <!-- middle shelf -->
  <rect x="246" y="112" width="52" height="7" rx="2.5" fill="url(#c7)"/>
  <rect x="246" y="103" width="52" height="7" rx="2.5" fill="url(#c4)"/>
  <rect x="310" y="112" width="52" height="7" rx="2.5" fill="url(#c3)"/>
  <rect x="310" y="103" width="52" height="7" rx="2.5" fill="url(#c2)"/>
  <rect x="310" y="94" width="52" height="7" rx="2.5" fill="url(#c8)"/>

  <!-- bottom shelf: a couple of storage boxes -->
  <rect x="246" y="146" width="54" height="30" rx="4" fill="#f0e3cd" stroke="#cfb392" stroke-width="1.2"/>
  <rect x="262" y="158" width="22" height="3" rx="1.5" fill="#cfb392"/>
  <rect x="310" y="146" width="54" height="30" rx="4" fill="#e6d6bc" stroke="#cfb392" stroke-width="1.2"/>
  <rect x="326" y="158" width="22" height="3" rx="1.5" fill="#cfb392"/>

  <!-- ============ drawers along the bottom ============ -->
  <rect x="46" y="190" width="176" height="26" rx="5" fill="#f6efe3" stroke="#cfb392" stroke-width="1.2"/>
  <rect x="120" y="201" width="28" height="3.5" rx="1.75" fill="#c2a480"/>
  <rect x="234" y="190" width="140" height="26" rx="5" fill="#f6efe3" stroke="#cfb392" stroke-width="1.2"/>
  <rect x="288" y="201" width="28" height="3.5" rx="1.75" fill="#c2a480"/>

  <!-- centre divider -->
  <rect x="222" y="20" width="12" height="204" fill="url(#wood)"/>
  <rect x="222" y="20" width="12" height="204" fill="none" stroke="#c9ae8b" stroke-width="1.2"/>
</svg>
