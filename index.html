  <script>
  /* One-time cache self-heal. A stale service worker can pin an old
     copy of the app; this clears every cache + unregisters the worker
     once per release tag, then reloads clean. Runs before anything else. */
  (function () {
    var TAG = 'fc-heal-59';
    try { if (localStorage.getItem('fc-heal') === TAG) return; } catch (e) { return; }
    var finish = function () {
      try { localStorage.setItem('fc-heal', TAG); } catch (e) {}
      location.reload();
    };
    var jobs = [];
    if (window.caches && caches.keys) {
      jobs.push(caches.keys().then(function (ks) {
        return Promise.all(ks.map(function (k) { return caches.delete(k); }));
      }));
    }
    if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
      jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
        return Promise.all(rs.map(function (r) { return r.unregister(); }));
      }));
    }
    if (jobs.length) { Promise.all(jobs).then(finish).catch(finish); }
    else { try { localStorage.setItem('fc-heal', TAG); } catch (e) {} }
  })();
  </script>
  <title>FitChecker — Know your fit before you buy</title>
  <meta name="description" content="Upload your measurements and a photo of any garment. FitChecker predicts how it will fit — too tight, too loose, too short — and recommends your best size.">
  <meta name="theme-color" content="#f5f1e9">
  <script>
  /* Theme init — runs before CSS so there is no flash. Stored choice is
     'system' | 'light' | 'dark'; system follows the OS setting live. */
  (function () {
    var KEY = 'fitcheck_theme';
    function sys() { return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
    function resolve(p) { return p === 'system' ? sys() : (p === 'light' ? 'light' : 'dark'); }
    function apply(p) {
      var r = resolve(p);
      document.documentElement.setAttribute('data-theme', r);
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute('content', r === 'dark' ? '#15120e' : '#f5f1e9');
    }
    try { apply(localStorage.getItem(KEY)); } catch (e) {}
    window.Theme = {
      get: function () { try { return localStorage.getItem(KEY) || 'dark'; } catch (e) { return 'dark'; } },
      set: function (p) { try { localStorage.setItem(KEY, p); } catch (e) {} apply(p); }
    };
    try { matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
      if (window.Theme.get() === 'system') apply('system');
    }); } catch (e) {}
  })();
  </script>
